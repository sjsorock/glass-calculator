name: Build Windows Calculator

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --name "GlassCalculator" glass_calculator.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: GlassCalculator-Windows
        path: dist/GlassCalculator.exe
