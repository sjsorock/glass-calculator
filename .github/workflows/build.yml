name: Build Calculator

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Build with PyInstaller
      run: pyinstaller --onefile --windowed --name Calculator glass_calculator.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Calculator-Windows
        path: dist/Calculator.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Build with PyInstaller
      run: pyinstaller --onefile --windowed --name Calculator glass_calculator.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Calculator-Linux
        path: dist/Calculator

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Build with PyInstaller
      run: pyinstaller --onefile --windowed --name Calculator glass_calculator.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Calculator-macOS
        path: dist/Calculator

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          Calculator-Windows/Calculator.exe
          Calculator-Linux/Calculator
          Calculator-macOS/Calculator
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
